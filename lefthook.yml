min_version: 1.11.0

output:
  - execution
  - summary
  - failure

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx,mjs,cjs,json,css,scss}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional:
      run: 'grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+" {1}'
