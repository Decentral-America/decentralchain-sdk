name: Cubensis Connect — Nightly E2E

on:
  schedule:
    # 02:00 UTC every day — runs against main so failures always map to a committed state.
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions UI for on-demand E2E runs.

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  e2e:
    name: WebdriverIO E2E (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: apps/cubensis-connect

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build extension (chrome)
        run: CUBENSIS_PLATFORM=chrome NODE_ENV=production node scripts/build.mjs

      - name: Start E2E services (DCC private node + Chrome WebDriver)
        run: docker compose up dcc-private-node hub chrome --wait
        timeout-minutes: 5

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          # Points the WebdriverIO runner at the Selenium Hub started above.
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-videos-${{ github.run_id }}
          path: apps/cubensis-connect/test/videos/
          retention-days: 7

      - name: Stop E2E services
        if: always()
        run: docker compose down --volumes
