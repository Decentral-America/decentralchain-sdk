name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  cancel-in-progress: true
  group: ci-${{ github.ref }}

permissions:
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive NX SHAs
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Scan for secrets (Trivy)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: secret

      - name: Check module boundaries
        run: node scripts/check-boundaries.mjs

      - name: Biome lint (affected)
        run: npx nx affected -t biome-lint

      - name: Typecheck (affected)
        run: npx nx affected -t typecheck --exclude=cubensis-connect

      - name: Build (affected)
        run: npx nx affected -t build

      - name: Test (affected)
        run: npx nx affected -t test

      - name: Verify package exports (affected)
        run: npx nx affected -t check:exports --exclude=cubensis-connect,exchange,scanner

      - name: Verify package publishing (affected)
        run: npx nx affected -t check:publint --exclude=cubensis-connect,exchange,scanner,ts-types

      - name: Verify bundle size (affected)
        run: npx nx affected -t check:size --exclude=cubensis-connect,exchange,scanner

      - name: Format check
        run: npx biome format .
