name: Dependency Update Check

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for outdated packages
        id: outdated
        run: |
          echo "## Outdated Dependencies" > outdated-report.md
          echo "" >> outdated-report.md
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ]; then
            echo "HAS_UPDATES=true" >> $GITHUB_OUTPUT
            node -pe "
              const data = require('./outdated.json');
              '| Package | Current | Wanted | Latest |\n' +
              '|---------|---------|--------|--------|\n' +
              Object.entries(data).map(([name, info]) => 
                \`| \${name} | \${info.current} | \${info.wanted} | \${info.latest} |\`
              ).join('\n')
            " >> outdated-report.md
          else
            echo "HAS_UPDATES=false" >> $GITHUB_OUTPUT
            echo "No outdated dependencies found! 🎉" >> outdated-report.md
          fi

      - name: Run security audit
        run: |
          echo "" >> outdated-report.md
          echo "## Security Audit" >> outdated-report.md
          echo "" >> outdated-report.md
          npm audit --json > audit.json || true
          node -pe "
            const audit = require('./audit.json');
            if (audit.metadata.vulnerabilities.total === 0) {
              'No vulnerabilities found! ✅';
            } else {
              '⚠️ Vulnerabilities found:\n\n' +
              '| Severity | Count |\n' +
              '|----------|-------|\n' +
              Object.entries(audit.metadata.vulnerabilities)
                .filter(([k]) => k !== 'total')
                .map(([severity, count]) => \`| \${severity} | \${count} |\`)
                .join('\n');
            }
          " >> outdated-report.md

      - name: Create Issue for Updates
        if: steps.outdated.outputs.HAS_UPDATES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outdated-report.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dependency Updates Available - ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['dependencies', 'maintenance']
            });
