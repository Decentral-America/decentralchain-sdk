version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns:
          - typescript
          - typescript-eslint
          - '@typescript-eslint/*'
      eslint:
        patterns:
          - eslint
          - '@eslint/*'
          - eslint-config-prettier
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
      build:
        patterns:
          - tsup
          - publint
          - '@arethetypeswrong/*'
          - size-limit
          - '@size-limit/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
