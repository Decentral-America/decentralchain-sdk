name: Checks
on:
  push:
    branches-ignore:
      - master
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:typescript
