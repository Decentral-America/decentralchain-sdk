# Nginx main configuration for DCC React Wallet
# Matches Angular version configuration

user  nginx;

error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

worker_processes  auto;

events {
    worker_connections  16384;
    multi_accept off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_names_hash_bucket_size 64;

    client_max_body_size 64m;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log main buffer=16k flush=2m;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 100;

    server_tokens off;

    # Set real IP from proxy headers
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Gzip compression
    gzip on;
    gzip_min_length 1024;
    gzip_disable "msie6";
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # Rate limiting — OWASP DoS mitigation for API proxy endpoints
    # Zone 'api': 30 requests/min per IP with 10-request burst
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # Zone 'per_ip': max concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=per_ip:10m;

    include /etc/nginx/sites-enabled/*;
}
