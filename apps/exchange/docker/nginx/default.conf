# Nginx server configuration for DCC React Wallet
# Environment variable: ${WEB_ENVIRONMENT} (mainnet|testnet|stagenet)

# Hide nginx version — OWASP: prevent server fingerprinting
server_tokens off;

# Status endpoint for monitoring
server {
    listen 8089;
    server_name 127.0.0.1;
    index index.html index.htm;

    location /_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}

# Main application server
# Port 8080 allows the container to run as a non-root user (ports < 1024
# require CAP_NET_BIND_SERVICE, which is dropped for unprivileged users).
# TLS termination is handled upstream by the load balancer / reverse proxy.
server {
    listen 8080;
    server_name _;

    # Root directory - uses WEB_ENVIRONMENT variable
    root /srv/www/dcc-react/dist/${WEB_ENVIRONMENT};
    index index.html index.htm;

    # ================================================================
    # Security Headers — OWASP HTTP Headers Cheat Sheet (March 2026)
    # https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
    # ================================================================

    # Prevent MIME sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;

    # Block clickjacking — kept for IE11 fallback; frame-ancestors 'none' in CSP
    # is the canonical enforcement for modern browsers
    add_header X-Frame-Options "DENY" always;

    # Disable the dangerous XSS auditor — OWASP: set to 0 explicitly because
    # the XSS auditor can itself introduce XSS vulnerabilities in legacy browsers
    add_header X-XSS-Protection "0" always;

    # Strict referrer — OWASP 2026 recommended value
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — 2 years per OWASP 2026 recommendation
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CSP — TradingView requires unsafe-inline/unsafe-eval and blob: workers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://s3.tradingview.com https://*.tradingview.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://s3.tradingview.com https://*.tradingview.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.decentralchain.io https://api.decentralchain.io wss://*.decentralchain.io https://s3.tradingview.com https://*.tradingview.com; frame-src 'self' https://s3.tradingview.com https://*.tradingview.com https://www.tradingview-widget.com https://s.tradingview.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Permissions-Policy — disable browser features not needed by the DEX
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), interest-cohort=()" always;

    # COOP — isolates browsing context to prevent Spectre cross-origin leaks
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # CORP — prevents other origins from reading this response
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ================================================================
    # Proxy endpoints
    # ================================================================

    # TradingView charts proxy — timeouts prevent resource exhaustion
    location /trading-view {
        proxy_pass https://charts.decentral.exchange;
        proxy_pass_request_body on;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Static client downloads (optional - for desktop app distribution)
    location /download/clients {
        alias /srv/www/static-clients/;
        autoindex on;
    }

    # ================================================================
    # SPA Routes - Rewrite to index.html
    # ================================================================

    # Remove trailing slashes
    rewrite ^/(.*)/$ /$1 permanent;

    # Wallet redirect
    location = /wallet {
        return 301 /wallet/assets;
    }

    # All SPA routes should serve index.html
    location ~ ^/(sign-in|signin|signup|sign-up|trade|dex|wallet|import|restore|export|create|tokens|bridge|swap|settings|dashboard|leasing|analytics|messages|markets|orderbook|account|admin) {
        try_files $uri $uri/ /index.html;
    }

    # ================================================================
    # Special locations
    # ================================================================

    # Export page - allow iframe embedding
    location = /export {
        rewrite /export /export.html;
    }
    location = /export.html {
        add_header X-Frame-Options "";
        try_files $uri /index.html;
    }

    # Keeper integration - allow iframe embedding
    location = /keeper.html {
        add_header X-Frame-Options "";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Info endpoint
    location /info {
        default_type "text/html";
        alias /srv/www/info.html;
    }

    # ================================================================
    # Static assets caching
    # ================================================================

    # HTML files - no cache (always get latest)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # JS, CSS, fonts, images - long-term cache with hashed filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # JSON files (config, etc.) - short cache
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Default location - serve SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
