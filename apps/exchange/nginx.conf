# Nginx configuration for DecentralExchange SPA
# Simple configuration for single-network deployment
# For production with multi-network, use docker/nginx/default.conf

# Hide nginx version — OWASP: prevent server fingerprinting
server_tokens off;

# Rate limiting — OWASP DoS mitigation. Defined at http-context level via conf.d include.
# Zone 'api': 30 requests/min per IP with burst of 10 for legitimate spikes.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # ================================================================
    # Security Headers — OWASP HTTP Headers Cheat Sheet (March 2026)
    # https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
    # ================================================================

    # Prevent MIME sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;

    # Block clickjacking — obsoleted by frame-ancestors in CSP but kept for
    # older browsers (IE11) that don't understand CSP
    add_header X-Frame-Options "DENY" always;

    # Disable the dangerous XSS auditor — OWASP: explicitly set to 0 because
    # the XSS auditor can itself introduce XSS vulnerabilities in legacy browsers
    add_header X-XSS-Protection "0" always;

    # Strict referrer — sends origin only on cross-origin; full URL on same-origin
    # OWASP 2026 recommended value (was: "origin" which was too broad)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — 2 years per OWASP 2026 (was 1 year)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CSP — TradingView requires unsafe-inline/unsafe-eval for chart rendering
    # blob: is required for TradingView web workers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://s3.tradingview.com https://*.tradingview.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://s3.tradingview.com https://*.tradingview.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.decentralchain.io https://api.decentralchain.io wss://*.decentralchain.io https://s3.tradingview.com https://*.tradingview.com; frame-src 'self' https://s3.tradingview.com https://*.tradingview.com https://www.tradingview-widget.com https://s.tradingview.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Permissions-Policy — disable all browser features not needed by the DEX
    # Prevents XSS from hijacking camera, microphone, geolocation, etc.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), interest-cohort=()" always;

    # COOP — isolates the browsing context to prevent Spectre-class attacks
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # CORP — prevents other sites from reading this response cross-origin
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Remove trailing slashes
    rewrite ^/(.*)/$ /$1 permanent;

    # TradingView charts proxy
    location /trading-view {
        proxy_pass https://charts.decentral.exchange;
        proxy_pass_request_body on;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # SPA routes - all client-side routes serve index.html
    location ~ ^/(sign-in|signin|signup|sign-up|trade|dex|wallet|import|restore|export|create|tokens|bridge|swap|settings|dashboard|leasing|analytics|messages|markets|orderbook|account|admin) {
        try_files $uri $uri/ /index.html;
    }

    # Main location - serve React app
    location / {
        try_files $uri $uri/ /index.html;

        # Cache control for HTML files (no cache)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Cache control for static assets (long-term cache)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # API proxy — timeouts prevent resource exhaustion (DoS mitigation)
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_conn per_ip 20;
        proxy_pass https://mainnet-node.decentralchain.io/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
