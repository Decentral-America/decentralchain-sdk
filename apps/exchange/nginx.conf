# Nginx configuration for DecentralExchange SPA
# Simple configuration for single-network deployment
# For production with multi-network, use docker/nginx/default.conf

server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers (matching Angular version)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.decentralchain.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Remove trailing slashes
    rewrite ^/(.*)/$ /$1 permanent;

    # TradingView charts proxy
    location /trading-view {
        proxy_pass https://charts.decentral.exchange;
        proxy_pass_request_body on;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # SPA routes - all client-side routes serve index.html
    location ~ ^/(sign-in|signin|signup|sign-up|trade|dex|wallet|import|restore|export|create|tokens|bridge|swap|settings|dashboard|leasing|analytics|messages|markets|orderbook|account|admin) {
        try_files $uri $uri/ /index.html;
    }

    # Main location - serve React app
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache control for HTML files (no cache)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # Cache control for static assets (long-term cache)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # API proxy (if needed)
    location /api/ {
        proxy_pass https://mainnet-node.decentralchain.io/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
