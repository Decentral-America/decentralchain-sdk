name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '24'

jobs:
  deploy-staging:
    name: Deploy Staging Environment
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.dcc-wallet.example.com
    env:
      HAS_AWS: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      HAS_VERCEL: ${{ secrets.VERCEL_TOKEN != '' }}
      HAS_SLACK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for staging
        run: npm run build
        env:
          VITE_APP_ENV: staging
          VITE_NETWORK: stagenet
          VITE_NODE_URL: https://nodes-stagenet.decentralchain.io
          VITE_MATCHER_URL: https://matcher-stagenet.decentralchain.io/matcher
          VITE_API_URL: https://data-service-stagenet.decentralchain.io
          VITE_EXPLORER_URL: https://stagenet.decentralscan.com
          VITE_DEBUG: true
          VITE_ENABLE_MOCKS: false

      - name: Upload staging build
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: dist/
          retention-days: 14

      - name: Deploy to AWS S3 (Staging)
        if: env.HAS_AWS == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3 staging bucket
        if: env.HAS_AWS == 'true'
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_STAGING }} \
            --delete \
            --cache-control "public, max-age=3600"

      - name: Deploy to Vercel (Staging)
        if: env.HAS_VERCEL == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          alias-domains: staging.dcc-wallet.vercel.app

      - name: Deploy to Docker Registry (Staging)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dcc-wallet:staging
            ghcr.io/${{ github.repository }}/dcc-wallet:staging-${{ github.sha }}

      - name: Notify deployment success
        if: success() && env.HAS_SLACK == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🎉 Staging deployment successful!
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            URL: https://staging.dcc-wallet.example.com
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure() && env.HAS_SLACK == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ Staging deployment failed
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
