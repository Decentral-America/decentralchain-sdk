name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)
  workflow_dispatch:  # Allow manual trigger with approval

env:
  NODE_VERSION: '24'

jobs:
  deploy-production:
    name: Deploy Production Environment
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://wallet.decentralchain.io
    env:
      HAS_AWS: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      HAS_CLOUDFRONT: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
      HAS_VERCEL: ${{ secrets.VERCEL_TOKEN != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for production
        run: NODE_ENV=production npm run build
        env:
          VITE_APP_ENV: production
          VITE_NETWORK: mainnet
          VITE_NODE_URL: https://mainnet-node.decentralchain.io
          VITE_MATCHER_URL: https://mainnet-matcher.decentralchain.io/matcher
          VITE_API_URL: https://data-service.decentralchain.io
          VITE_DATA_SERVICE_URL: https://data-service.decentralchain.io
          VITE_EXPLORER_URL: https://decentralscan.com
          VITE_DEBUG: false
          VITE_ENABLE_MOCKS: false
          VITE_SENTRY_ENABLED: true

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 30  # Keep production builds longer

      - name: Deploy to AWS S3 (Production)
        if: env.HAS_AWS == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3 production bucket
        if: env.HAS_AWS == 'true'
        run: |
          # Upload static assets with long-term caching
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_PRODUCTION }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "service-worker.js" \
            --exclude "manifest.json"
          
          # Upload HTML and service worker with no-cache
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_PRODUCTION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "service-worker.js" \
            --include "manifest.json"

      - name: Invalidate CloudFront cache
        if: env.HAS_CLOUDFRONT == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager

      - name: Deploy to Vercel (Production)
        if: env.HAS_VERCEL == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: --prod
          alias-domains: wallet.decentralchain.io

      - name: Build and push production Docker image
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image with tags
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dcc-wallet:latest
            ghcr.io/${{ github.repository }}/dcc-wallet:production
            ghcr.io/${{ github.repository }}/dcc-wallet:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag Docker image with version
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dcc-wallet:${{ github.ref_name }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🚀 Production deployment successful!
            Version: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            URL: https://wallet.decentralchain.io
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Production deployment FAILED!
            Version: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Requires immediate attention!
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Rollback on failure
        if: failure() && env.HAS_AWS == 'true'
        run: |
          echo "❌ Deployment failed. Consider rolling back to previous version."
          echo "To rollback: Promote previous Docker image or restore S3 from backup"
