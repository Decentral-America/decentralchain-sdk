# Docker Compose for DCC React Wallet
# Supports all three network environments

version: '3.8'

services:
  # ================================================================
  # Mainnet deployment
  # ================================================================
  dcc-exchange-mainnet:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        web_environment: mainnet
    image: dcc-exchange-react:mainnet
    container_name: dcc-exchange-mainnet
    environment:
      - WEB_ENVIRONMENT=mainnet
    ports:
      - "8080:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ================================================================
  # Testnet deployment
  # ================================================================
  dcc-exchange-testnet:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        web_environment: testnet
    image: dcc-exchange-react:testnet
    container_name: dcc-exchange-testnet
    environment:
      - WEB_ENVIRONMENT=testnet
    ports:
      - "8081:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ================================================================
  # Stagenet deployment
  # ================================================================
  dcc-exchange-stagenet:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        web_environment: stagenet
    image: dcc-exchange-react:stagenet
    container_name: dcc-exchange-stagenet
    environment:
      - WEB_ENVIRONMENT=stagenet
    ports:
      - "8082:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# Usage:
# ------
# Build and run mainnet:
#   docker-compose up -d dcc-exchange-mainnet
#
# Build and run all networks:
#   docker-compose up -d
#
# Build only (no run):
#   docker-compose build
#
# View logs:
#   docker-compose logs -f dcc-exchange-mainnet
#
# Stop all:
#   docker-compose down
