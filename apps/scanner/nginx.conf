server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Suppress version disclosure — OWASP: server fingerprinting prevention
    server_tokens off;

    # Security headers
    # DENY prevents any framing — the scanner is never embedded in iframes
    add_header X-Frame-Options "DENY" always;
    # Explicitly disable the XSS auditor — OWASP: it's legacy and can introduce vulnerabilities
    add_header X-XSS-Protection "0" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org; connect-src 'self' https://mainnet-node.decentralchain.io https://testnet-node.decentralchain.io https://mainnet-matcher.decentralchain.io https://data-service.decentralchain.io https://*.ingest.sentry.io; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets (hashed filenames = immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Geo enrichment proxy — ipinfo.io (50K/month free, best accuracy)
    location /api/geo/ {
        proxy_pass https://ipinfo.io/;
        proxy_set_header Host ipinfo.io;
        proxy_ssl_server_name on;
    }

    location /api/greencheck/ {
        proxy_pass https://api.thegreenwebfoundation.org/api/v3/greencheck/;
        proxy_set_header Host api.thegreenwebfoundation.org;
        proxy_ssl_server_name on;
    }
}
