services:
  scanner:
    build:
      context: .
      target: runtime
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Override endpoints for different networks:
      # DCC_NODE_URL: https://testnet-node.decentralchain.io
      # DCC_MATCHER_URL: https://testnet-matcher.decentralchain.io
      # DCC_DATA_SERVICE_URL: https://data-service.decentralchain.io/v0
      # VITE_SENTRY_DSN: "https://your-dsn@sentry.io/project"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
